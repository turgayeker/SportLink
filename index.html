<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLink - Spor İlan Havuzu</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --neon-green: #39ff14;
            --text-color: #f3f4f6;
            --text-gray: #9ca3af;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-green);
        }
        /* Form Alanı Tasarımı */
        .form-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .form-section h3 {
            color: var(--neon-green);
            margin-top: 0;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        input, select, textarea {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
        }
        textarea {
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            height: 80px;
        }
        .btn-submit {
            background-color: var(--neon-green);
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            box-shadow: 0 0 15px var(--neon-green);
            transform: scale(1.02);
        }
        /* Filtreleme Alanı */
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-section input, .filter-section select {
            flex: 1;
            min-width: 150px;
        }
        .btn-filter {
            background-color: #1f2937;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        /* İlan Kartları */
        .ilan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .ilan-kart {
            background-color: var(--card-bg);
            border: 1px solid #1f2937;
            padding: 20px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .ilan-kart:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            transform: translateY(-5px);
        }
        .ilan-kart h2 {
            margin-top: 0;
            font-size: 20px;
            color: white;
        }
        .tag-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .tag {
            background-color: #1e293b;
            color: var(--neon-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(57, 255, 20, 0.3);
        }
        .detay {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ SportLink İlan Havuzu ⚡</h1>

    <div class="form-section">
        <h3>🚀 Yeni Spor İlanı Yayınla</h3>
        <form action="/ilan-ekle" method="POST">
            <div class="form-grid">
                <input type="text" name="baslik" placeholder="İlan Başlığı (Örn: Hentbol Kaleci Antrenörü Aranıyor)" required>
                <input type="text" name="brans" placeholder="Branş (Örn: Hentbol, Badminton)" required>
                <input type="text" name="sehir" placeholder="Şehir (Örn: Samsun, Ordu, İstanbul)" required>
            </div>
            <div style="margin-bottom: 15px;">
                <textarea name="detay" placeholder="İlan detayları, aranan özellikler ve iletişim bilgileri..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">İlani Canlıya Al ve Listele</button>
        </form>
    </div>

    <form method="GET" action="/" class="filter-section">
        <input type="text" name="search" placeholder="Kelime ile ara...">
        <input type="text" name="brans" placeholder="Branşa göre filtrele...">
        <input type="text" name="sehir" placeholder="Şehre göre filtrele...">
        <button type="submit" class="btn-filter">Filtreleri Uygula</button>
        <a href="/" style="color: var(--text-gray); text-decoration: none; padding-top: 10px;">Temizle</a>
    </form>

    <div class="ilan-grid">
        {% for ilan in ilanlar %}
        <div class="ilan-kart">
            <h2>{{ ilan.baslik }}</h2>
            <div class="tag-group">
                <span class="tag">🏀 {{ ilan.brans }}</span>
                <span class="tag">📍 {{ ilan.sehir }}</span>
            </div>
            <p class="detay">{{ ilan.detay }}</p>
        </div>
        {% else %}
        <p style="text-align: center; color: var(--text-gray); grid-column: 1/-1;">Aradığınız kriterlere uygun ilan bulunamadı.</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
