<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLink - Profilim</title>
    <style>
        body {
            background-color: #111111;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .profil-kart {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }
        .profil-avatar {
            width: 90px;
            height: 90px;
            background-color: #2a2a2a;
            border: 3px solid #00FF66;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
        }
        h2 {
            margin: 0 0 5px 0;
            color: #FFFFFF;
            font-size: 24px;
        }
        .unvan-etiket {
            display: inline-block;
            background-color: rgba(0, 255, 102, 0.1);
            color: #00FF66;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 102, 0.2);
        }
        .detay-izgara {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            margin-bottom: 30px;
        }
        .detay-kutu {
            background-color: #222222;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }
        .detay-baslik {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .detay-deger {
            font-size: 15px;
            color: #FFFFFF;
            font-weight: 500;
        }
        .aksiyon-butonlari {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            text-align: center;
        }
        .btn-primary {
            background-color: #00FF66;
            color: #111111;
        }
        .btn-primary:hover {
            background-color: #00cc52;
        }
        .btn-secondary {
            background-color: #2a2a2a;
            color: #aaaaaa;
            border: 1px solid #333333;
        }
        .btn-secondary:hover {
            color: #FFFFFF;
            border-color: #555555;
        }
    </style>
</head>
<body>

<div class="profil-kart">
    <div class="profil-avatar">👤</div>
    <h2>{{ kullanıcı.eposta.split('@')[0] }}</h2>
    <span class="unvan-etiket">🏆 {{ kullanıcı.rol }}</span>
    
    <div class="detay-izgara">
        <div class="detay-kutu">
            <div class="detay-baslik">E-Posta</div>
            <div class="detay-deger" style="font-size: 13px;">{{ kullanıcı.eposta }}</div>
        </div>
        <div class="detay-kutu">
            <div class="detay-baslik">Durum</div>
            <div class="detay-deger" style="color: #00FF66;">● Aktif Üye</div>
        </div>
        <div class="detay-kutu">
            <div class="detay-baslik">Ekosistem</div>
            <div class="detay-deger">SportLink TR</div>
        </div>
        <div class="detay-kutu">
            <div class="detay-baslik">Hesap Tipi</div>
            <div class="detay-deger">Profesyonel</div>
        </div>
    </div>

    <div class="aksiyon-butonlari">
        <a href="/ilanlar" class="btn btn-primary">İlan Havuzuna Git</a>
        <a href="/" class="btn btn-secondary">Çıkış Yap</a>
    </div>
</div>

</body>
</html>
