<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLink - Kayıt Ol</title>
    <style>
        body {
            background-color: #111111;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .kayit-kutu {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        h1 {
            color: #00FF66;
            margin-bottom: 30px;
            font-size: 32px;
            letter-spacing: 1px;
        }
        .grup {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaaaaa;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #333333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, select:focus {
            border-color: #00FF66;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #00FF66;
            color: #111111;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }
    </style>
</head>
<body>

<div class="kayit-kutu">
    <h1>SportLink</h1>
    <form action="/kaydet" method="POST">
        <div class="grup">
            <label>E-posta Adresiniz</label>
            <input type="email" name="eposta" placeholder="ornek@spor.com" required>
        </div>
        <div class="grup">
            <label>Şifreniz</label>
            <input type="password" name="sifre" placeholder="••••••••" required>
        </div>
        <div class="grup">
            <label>Platformdaki Rolünüz</label>
            <select name="rol" required>
                <option value="" disabled selected>Rolünüzü Seçin...</option>
                <option value="Sporcu">Sporcu</option>
                <option value="Antrenör / Teknik Ekip">Antrenör / Teknik Ekip</option>
                <option value="Akademisyen / Araştırmacı">Akademisyen / Araştırmacı</option>
                <option value="Yönetici / Kulüp Yetkilisi">Yönetici / Kulüp Yetkilisi</option>
            </select>
        </div>
        <button type="submit">Kayıt Ol ve Profili Oluştur</button>
    </form>
</div>

</body>
</html>
